<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ingresar dinero</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #f4f6fb;
        color: #162033;
      }
      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 24px;
      }
      .header {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      .card {
        background: white;
        border: 1px solid #d8dee8;
        border-radius: 18px;
        padding: 24px;
        box-shadow: 0 14px 40px rgba(22, 32, 51, 0.12);
      }
      .muted {
        color: #5f6b7a;
      }
      .field {
        display: grid;
        gap: 8px;
        margin: 16px 0;
      }
      input[type="number"] {
        padding: 12px 14px;
        border: 1px solid #d8dee8;
        border-radius: 12px;
        font-size: 1rem;
      }
      input[type="number"]:focus {
        outline: none;
        border-color: #8fb0ff;
        box-shadow: 0 0 0 4px rgba(34, 102, 238, 0.12);
      }
      .flash {
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid rgba(217, 75, 75, 0.35);
        background: #fceff0;
        margin: 12px 0;
      }
      .btn {
        display: inline-block;
        border: 0;
        padding: 12px 16px;
        border-radius: 12px;
        font-weight: 700;
        color: white;
        background: #1e9e63;
        cursor: pointer;
        margin-top: 16px;
      }
      a {
        color: #2266ee;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="header">
        <a href="{{ url_for('usuarios_page') }}">Volver al listado</a>
        <span class="muted">Ingreso de dinero al saldo</span>
      </div>

      <section class="card">
        <h2>Ingresar dinero</h2>
        <p class="muted">
          El saldo actual del usuario es
          <strong>${{ '%.2f'|format(usuario.saldo) }}</strong>.
        </p>
        {% if error %}
        <div class="flash">{{ error }}</div>
        {% endif %}
        <form method="post">
          <div class="field">
            <label for="monto_ingreso">Monto a ingresar</label>
            <input
              id="monto_ingreso"
              name="monto_ingreso"
              type="number"
              step="0.01"
              min="0.01"
              placeholder="Ej. 500"
              required
            />
          </div>
          <button class="btn" type="submit">Actualizar saldo</button>
        </form>
      </section>
    </main>
  </body>
</html>
