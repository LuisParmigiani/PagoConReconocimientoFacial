<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modificar usuario</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #f4f6fb;
        color: #162033;
      }
      main {
        max-width: 800px;
        margin: 0 auto;
        padding: 24px;
      }
      .header {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      .card {
        background: white;
        border: 1px solid #d8dee8;
        border-radius: 18px;
        padding: 24px;
        box-shadow: 0 14px 40px rgba(22, 32, 51, 0.12);
      }
      .muted {
        color: #5f6b7a;
      }
      .field {
        display: grid;
        gap: 8px;
        margin: 0;
      }
      .grid-2 {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }
      @media (max-width: 800px) {
        .grid-2 {
          grid-template-columns: 1fr;
        }
      }
      input[type="text"],
      input[type="number"] {
        padding: 12px 14px;
        border: 1px solid #d8dee8;
        border-radius: 12px;
        font-size: 1rem;
      }
      input:focus {
        outline: none;
        border-color: #8fb0ff;
        box-shadow: 0 0 0 4px rgba(34, 102, 238, 0.12);
      }
      .flash {
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid rgba(217, 75, 75, 0.35);
        background: #fceff0;
        margin: 12px 0;
      }
      .btn {
        display: inline-block;
        border: 0;
        padding: 12px 16px;
        border-radius: 12px;
        font-weight: 700;
        color: white;
        background: #2266ee;
        cursor: pointer;
        margin-top: 16px;
      }
      a {
        color: #2266ee;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="header">
        <a href="{{ url_for('usuarios_page') }}">Volver al listado</a>
        <span class="muted">Modificar nombre y saldo actual</span>
      </div>

      <section class="card">
        <h2>Modificar usuario</h2>
        <p class="muted">
          Si cambias el nombre, también se renombra el archivo del dataset
          asociado.
        </p>
        {% if error %}
        <div class="flash">{{ error }}</div>
        {% endif %}
        <form method="post">
          <div class="grid-2">
            <div class="field">
              <label for="nombre">Nombre</label>
              <input
                id="nombre"
                name="nombre"
                type="text"
                value="{{ usuario.nombre }}"
                required
              />
            </div>
            <div class="field">
              <label for="saldo">Saldo actual</label>
              <input
                id="saldo"
                name="saldo"
                type="number"
                step="0.01"
                value="{{ '%.2f'|format(usuario.saldo) }}"
              />
            </div>
          </div>
          <button class="btn" type="submit">Guardar cambios</button>
        </form>
      </section>
    </main>
  </body>
</html>
