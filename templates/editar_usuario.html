{% extends 'base.html' %} {% block title %}Modificar usuario{% endblock %} {%
block content %}
<div class="top-nav">
  <a href="{{ url_for('usuarios_page') }}">Volver al listado</a
  ><span class="muted">Modificar nombre y saldo actual</span>
</div>
<section class="panel">
  <h2>Modificar usuario</h2>
  <p class="muted">
    Si cambias el nombre, también se renombra el archivo del dataset asociado.
  </p>
  {% if error %}
  <div class="flash error">{{ error }}</div>
  {% endif %}
  <form method="post">
    <div class="grid-2">
      <div class="field">
        <label for="nombre">Nombre</label>
        <input
          id="nombre"
          name="nombre"
          type="text"
          value="{{ usuario.nombre }}"
          required
        />
      </div>
      <div class="field">
        <label for="saldo">Saldo actual</label>
        <input
          id="saldo"
          name="saldo"
          type="number"
          step="0.01"
          value="{{ '%.2f'|format(usuario.saldo) }}"
        />
      </div>
    </div>
    <button class="btn btn-primary" type="submit">Guardar cambios</button>
  </form>
</section>
{% endblock %}
