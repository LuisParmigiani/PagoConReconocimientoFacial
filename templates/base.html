<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Pago Biométrico{% endblock %}</title>
    <style>
      :root {
        --bg: #f4f6fb;
        --panel: #ffffff;
        --panel-2: #eef2f7;
        --text: #162033;
        --muted: #5f6b7a;
        --primary: #2266ee;
        --primary-2: #1749b8;
        --green: #1e9e63;
        --red: #d94b4b;
        --gray: #6f7782;
        --border: #d8dee8;
        --shadow: 0 18px 50px rgba(22, 32, 51, 0.12);
      }

      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: radial-gradient(
          circle at top left,
          #edf3ff 0,
          #f4f6fb 36%,
          #eef1f7 100%
        );
        color: var(--text);
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      .shell {
        max-width: 1220px;
        margin: 0 auto;
        padding: 32px 18px 40px;
      }
      .hero {
        background: linear-gradient(
          135deg,
          #18243a 0%,
          #253b66 55%,
          #2b5ac7 100%
        );
        color: white;
        border-radius: 24px;
        padding: 34px;
        box-shadow: var(--shadow);
        position: relative;
        overflow: hidden;
      }
      .hero::after {
        content: "";
        position: absolute;
        right: -80px;
        top: -70px;
        width: 240px;
        height: 240px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
      }
      .hero h1 {
        margin: 0 0 10px;
        font-size: clamp(2rem, 4vw, 3.4rem);
      }
      .hero p {
        margin: 0;
        max-width: 780px;
        color: rgba(255, 255, 255, 0.86);
        line-height: 1.55;
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 14px;
        margin-top: 18px;
      }
      .stat {
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.16);
        backdrop-filter: blur(5px);
        border-radius: 18px;
        padding: 14px 16px;
      }
      .stat strong {
        display: block;
        font-size: 1.4rem;
        margin-bottom: 2px;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 22px;
        box-shadow: var(--shadow);
        padding: 24px;
      }
      .panel + .panel {
        margin-top: 18px;
      }
      .toolbar {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin: 18px 0 0;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        border-radius: 14px;
        border: 1px solid transparent;
        padding: 0 18px;
        font-weight: 700;
        cursor: pointer;
        transition:
          transform 0.12s ease,
          box-shadow 0.12s ease,
          background 0.12s ease;
      }
      .btn:hover {
        transform: translateY(-1px);
      }
      .btn-primary {
        background: var(--primary);
        color: white;
        box-shadow: 0 10px 24px rgba(34, 102, 238, 0.18);
      }
      .btn-primary:hover {
        background: var(--primary-2);
      }
      .btn-green {
        background: var(--green);
        color: white;
      }
      .btn-gray {
        background: var(--gray);
        color: white;
      }
      .btn-red {
        background: var(--red);
        color: white;
      }
      .btn-outline {
        background: white;
        color: var(--text);
        border-color: var(--border);
      }
      .muted {
        color: var(--muted);
      }
      .grid-2 {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }
      @media (max-width: 860px) {
        .grid-2 {
          grid-template-columns: 1fr;
        }
      }
      .field {
        display: grid;
        gap: 7px;
        margin-bottom: 15px;
      }
      label {
        font-weight: 700;
      }
      input[type="text"],
      input[type="number"] {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px 15px;
        font-size: 1rem;
        outline: none;
        background: white;
      }
      input[type="text"]:focus,
      input[type="number"]:focus {
        border-color: #8fb0ff;
        box-shadow: 0 0 0 4px rgba(34, 102, 238, 0.12);
      }
      .flash-wrap {
        display: grid;
        gap: 10px;
        margin: 18px 0 0;
      }
      .flash {
        border-radius: 16px;
        padding: 13px 15px;
        border: 1px solid var(--border);
        background: #f9fbff;
      }
      .flash.success {
        border-color: rgba(30, 158, 99, 0.35);
        background: #eef9f2;
      }
      .flash.error {
        border-color: rgba(217, 75, 75, 0.35);
        background: #fceff0;
      }
      .table-wrap {
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 1050px;
      }
      th,
      td {
        padding: 14px 12px;
        border-bottom: 1px solid var(--border);
        text-align: left;
        vertical-align: middle;
      }
      th {
        background: #f4f7fb;
        color: var(--muted);
        font-size: 0.92rem;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }
      tr:hover td {
        background: #fafcff;
      }
      .photo-cell img {
        width: 92px;
        height: 92px;
        object-fit: cover;
        border-radius: 16px;
        border: 1px solid var(--border);
        background: #edf1f7;
      }
      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .actions form {
        display: inline;
      }
      .actions .btn {
        min-height: 40px;
        padding: 0 14px;
        border-radius: 12px;
        font-size: 0.92rem;
      }
      .top-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 18px;
      }
      .top-nav a {
        color: var(--primary);
        font-weight: 700;
      }
      .note {
        margin-top: 14px;
        padding: 14px 16px;
        background: #f7f9fc;
        border: 1px solid var(--border);
        border-radius: 16px;
        color: var(--muted);
        line-height: 1.5;
      }
      .result-box {
        white-space: pre-wrap;
        background: #f8fafc;
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 16px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="shell">{% block content %}{% endblock %}</div>
  </body>
</html>
